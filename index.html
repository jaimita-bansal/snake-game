<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Snake Game</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="game-shell">
      <h1>Snake</h1>
      <p class="hint">Use arrow keys to move.</p>
      <canvas
        id="game-canvas"
        width="400"
        height="400"
        aria-label="Snake game board"
      ></canvas>
      <p id="score" class="status">Score: 0</p>
      <p id="level" class="status">Level: 1</p>
      <p id="status" class="status">Press Play to start</p>
      <div class="controls">
        <button id="play-button" type="button">Play</button>
        <button id="pause-button" type="button" disabled>Pause</button>
        <button id="restart-button" type="button">Restart</button>
        <button id="shadow-button" type="button">Shadow: Off</button>
      </div>
    </main>

    <script type="module" src="./script.js"></script>
  </body>
</html>
